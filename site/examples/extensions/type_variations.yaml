%YAML 1.2
---
# Example: extension showing type variations (e.g. dictionary-encoded strings,
# large-offset strings, avro/cstruct-encoded structs). This is an example, not an
# official extension.
urn: extension:example:type_variations
type_variations:
  - parent: string
    name: dict4
    description: a four-byte dictionary encoded string
    functions: INHERITS
  - parent: string
    name: bigoffset
    description: >-
      The arrow large string representation of strings, still restricted to the default string size defined in
      Substrait.
    functions: SEPARATE
  - parent: struct
    name: avro
    description: an avro encoded struct
    functions: SEPARATE
  - parent: struct
    name: cstruct
    description: a cstruct representation of the struct
    functions: SEPARATE
  - parent: struct
    name: dict2
    description: a 2-byte dictionary encoded string.
    functions: INHERITS
