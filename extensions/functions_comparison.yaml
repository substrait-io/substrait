%YAML 1.2
---
scalar_functions:
  -
    name: "not_equal"
    description: Whether two values are not_equal (nulls are considered not not-equal).
    impls:
      - args:
          - value: any1
          - value: any1
        return: BOOLEAN
  -
    name: "equal"
    description: Whether two values are equal (nulls are considered unequal).
    impls:
      - args:
          - value: any1
          - value: any1
        return: BOOLEAN
  -
    name: "is_not_distinct_from"
    description: Whether two values are equal (nulls are considered equal).
    impls:
      - args:
          - value: any1
          - value: any1
        return: BOOLEAN
  -
    name: "lt"
    description: Less than
    impls:
      - args:
          - value: any1
          - value: any1
        return: BOOLEAN
  -
    name: "gt"
    description: Greater than
    impls:
      - args:
          - value: any1
          - value: any1
        return: BOOLEAN
  -
    name: "lte"
    description: Less than or equal to
    impls:
      - args:
          - value: any1
          - value: any1
        return: BOOLEAN
  -
    name: "gte"
    description: Greater than or equal to
    impls:
      - args:
          - value: any1
          - value: any1
        return: BOOLEAN
  -
    name: "is_null"
    description: Whether a value is null.
    impls:
      - args:
          - value: any1
        return: BOOLEAN
        nullability: DECLARED_OUTPUT
  -
    name: "is_not_null"
    description: Whether a value is not null.
    impls:
      - args:
          - value: any1
        return: BOOLEAN
        nullability: DECLARED_OUTPUT
  -
    name: "least"
    description: Returns the smallest value from a list of arguments.
    impls:
      - args:
          - value: i8
        variadic:
          min: 1
        return: i8
      - args:
          - value: i16
        variadic:
          min: 1
        return: i16
      - args:
          - value: i32
        variadic:
          min: 1
        return: i32
      - args:
          - value: i64
        variadic:
          min: 1
        return: i64
      - args:
          - value: fp32
        variadic:
          min: 1
        return: fp32
      - args:
        - value: fp64
        variadic:
          min: 1
        return: fp64
  -
    name: "greatest"
    description: Returns the largest value from a list of arguments.
    impls:
      - args:
          - value: i8
        variadic:
          min: 1
        return: i8
      - args:
          - value: i16
        variadic:
          min: 1
        return: i16
      - args:
          - value: i32
        variadic:
          min: 1
        return: i32
      - args:
          - value: i64
        variadic:
          min: 1
        return: i64
      - args:
          - value: fp32
        variadic:
          min: 1
        return: fp32
      - args:
          - value: fp64
        variadic:
          min: 1
        return: fp64
