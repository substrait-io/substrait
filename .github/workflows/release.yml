name: Release

on:
  schedule:
    # 2 AM on Sunday
    - cron: "0 2 * * 0"
  workflow_dispatch:

# we do not want more than one release workflow executing at the same time, ever
concurrency:
  group: release
  # cancelling in the middle of a release would create incomplete releases
  # so cancel-in-progress is false
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'substrait-io/substrait'
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          # request a token scoped to every repo ci/release/notify.sh touches:
          # substrait (tag lookup), substrait-packaging (build trigger), and the
          # downstream implementation repos (release notification issues)
          repositories: |
            substrait
            substrait-packaging
            substrait-java
            substrait-python
            substrait-go
            substrait-rs

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          cache: true

      - name: run semantic-release
        run: pixi run release
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
